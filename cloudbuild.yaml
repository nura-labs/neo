steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyDHaJXjc4soJV0LcETBq4Y3WsCOXUJfy5U"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=crested-sentry-492800-s9.firebaseapp.com"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=crested-sentry-492800-s9"
      - "--build-arg=NEXT_PUBLIC_APP_URL=https://neo.nura.sh"
      - "-t"
      - "us-central1-docker.pkg.dev/crested-sentry-492800-s9/neo/neo:$COMMIT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/crested-sentry-492800-s9/neo/neo:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "us-central1-docker.pkg.dev/crested-sentry-492800-s9/neo/neo"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "neo"
      - "--image=us-central1-docker.pkg.dev/crested-sentry-492800-s9/neo/neo:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--add-cloudsql-instances=crested-sentry-492800-s9:us-central1:neo-db"
      - "--set-env-vars=DB_NAME=neo,DB_USER=neo-user,INSTANCE_UNIX_SOCKET=/cloudsql/crested-sentry-492800-s9:us-central1:neo-db,NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyDHaJXjc4soJV0LcETBq4Y3WsCOXUJfy5U,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=crested-sentry-492800-s9.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=crested-sentry-492800-s9,NEXT_PUBLIC_APP_URL=https://neo.nura.sh"
      - "--set-secrets=DB_PASS=db-password:latest"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"

images:
  - "us-central1-docker.pkg.dev/crested-sentry-492800-s9/neo/neo"

options:
  logging: CLOUD_LOGGING_ONLY
